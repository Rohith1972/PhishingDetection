safebrowsing:
  api:
    key: AIzaSyD7jFUo-7RJ3TYE7BAgiSLtA0lxz63RV0I

app:
  jwt:
    secret: ${JWT_SECRET:PhishGuardSuperSecretKeyForJwtAuthenticationWhichNeedsToBeLongEnoughReplaceThisInProd999}
    expiration: 86400000 # 24 hours in ms
  
  security:
    cors:
      allowed-origins: "*"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
